name: myapp
version: "1.0"
services:
  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      command: ["redis-cli", "ping"]
      interval: 5
      timeout: 3

  web:
    image: nginx:alpine
    ports:
      - "8081:80"
    depends_on:
      - redis
    restart: always
    healthcheck:
      http: /
      interval: 10
      timeout: 5
